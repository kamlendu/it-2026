      xmlns:h="jakarta.faces.html"
      xmlns:f="jakarta.faces.core">
    <h:head>
        <title>Facelet Title</title>
    </h:head>
    <h:body>
      
        <h:form>
           
            <h:dataTable var="b" value="#{bookCDI.books}" border="1">
                <h:column>
                    <f:facet name="header">Book ID </f:facet>
                    #{b.bookID}
                </h:column>
             <h:column>
                    <f:facet name="header">Book Name </f:facet>
                    #{b.bookName}
                </h:column>
             <h:column>
                    <f:facet name="header">Author Name </f:facet>
                    #{b.authorName}
                </h:column>
                           
            
            </h:dataTable>
            
            
            
            
        </h:form>
        
        
        
        
        
    </h:body>
